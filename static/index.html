<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Maker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            padding: 0.9rem 1rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #fff;
            color: #111;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #7c3aed;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            padding: 0.9rem 1.5rem;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background: #6d28d9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            padding: 1rem;
            display: none;
        }

        .status.visible {
            display: block;
        }

        .status .message {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .status .error {
            color: #ef4444;
        }

        .progress-wrap {
            background: #e5e5e5;
            border-radius: 999px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.75rem;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #7c3aed;
            border-radius: 999px;
            transition: width 0.6s ease;
        }

        .progress-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.4rem;
        }

        .player {
            display: none;
            margin-top: 1rem;
        }

        .player.visible {
            display: block;
        }

        .player-label {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        audio {
            width: 100%;
            border-radius: 10px;
            outline: none;
        }

        .download-link {
            display: block;
            text-align: center;
            margin-top: 0.75rem;
            color: #7c3aed;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        .actions {
            text-align: center;
            margin-top: 1.5rem;
            display: none;
        }

        .actions.visible {
            display: block;
        }

        .actions button {
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: #e5e5e5;
            color: #111;
        }

        .actions button:hover:not(:disabled) {
            background: #d4d4d4;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <h1>Karaoke Maker</h1>
        <p class="subtitle">Paste a YouTube link, get the karaoke version</p>

        <form class="input-group" id="form" onsubmit="return handleSubmit(event)">
            <label for="urlInput" class="sr-only">YouTube URL</label>
            <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." autofocus
                   aria-label="YouTube URL" required>
            <button type="submit" id="goBtn">Go</button>
        </form>

        <div class="status" id="status" role="status" aria-live="polite">
            <p class="message" id="statusMsg"></p>
            <div class="progress-wrap" id="progressWrap" style="display:none">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="progress-label" id="progressLabel"></p>
        </div>

        <div class="player" id="player">
            <p class="player-label">Karaoke Version</p>
            <audio controls id="audio" aria-label="Karaoke audio player"></audio>
            <a class="download-link" id="downloadLink" href="#" download>Download karaoke track</a>
        </div>

        <div class="actions" id="actions">
            <button type="button" onclick="resetForm()">Process another song</button>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const status = document.getElementById('status');
        const statusMsg = document.getElementById('statusMsg');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar = document.getElementById('progressBar');
        const progressLabel = document.getElementById('progressLabel');
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const downloadLink = document.getElementById('downloadLink');
        const actions = document.getElementById('actions');

        let isProcessing = false;
        let abortController = null;
        let progressInterval = null;

        function handleSubmit(e) {
            e.preventDefault();
            if (!isProcessing) process();
            return false;
        }

        function resetForm() {
            urlInput.value = '';
            urlInput.disabled = false;
            goBtn.disabled = false;
            player.classList.remove('visible');
            actions.classList.remove('visible');
            status.classList.remove('visible');
            audio.src = '';
            stopProgress();
            urlInput.focus();
        }

        function startProgress() {
            // Animate from 0% to 90% over ~3 minutes, then hold until done
            const totalMs = 180000;
            const startTime = Date.now();
            progressWrap.style.display = 'block';
            progressBar.style.width = '0%';
            progressLabel.textContent = '';

            progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const pct = Math.min(90, (elapsed / totalMs) * 90);
                progressBar.style.width = pct.toFixed(1) + '%';
                const secsElapsed = Math.floor(elapsed / 1000);
                progressLabel.textContent = `${secsElapsed}s elapsed`;
            }, 500);
        }

        function finishProgress() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            progressLabel.textContent = 'Done!';
        }

        function stopProgress() {
            clearInterval(progressInterval);
            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';
            progressLabel.textContent = '';
        }

        async function process() {
            const url = urlInput.value.trim();
            if (!url) return;

            isProcessing = true;
            abortController = new AbortController();

            goBtn.disabled = true;
            urlInput.disabled = true;
            player.classList.remove('visible');
            actions.classList.remove('visible');

            status.classList.add('visible');
            statusMsg.className = 'message';
            statusMsg.textContent = 'Starting...';
            startProgress();

            let jobId = null;

            try {
                const res = await fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                    signal: abortController.signal,
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    throw new Error('Server returned an invalid response. Please try again.');
                }

                if (res.status === 429) {
                    stopProgress();
                    statusMsg.className = 'message error';
                    let secs = 60;
                    statusMsg.textContent = `Too many requests. Try again in ${secs}s.`;
                    const countdown = setInterval(() => {
                        secs--;
                        if (secs <= 0) {
                            clearInterval(countdown);
                            statusMsg.className = 'message';
                            statusMsg.textContent = 'Ready. Paste a URL and try again.';
                            goBtn.disabled = false;
                            urlInput.disabled = false;
                        } else {
                            statusMsg.textContent = `Too many requests. Try again in ${secs}s.`;
                        }
                    }, 1000);
                    isProcessing = false;
                    abortController = null;
                    return;
                }

                if (!res.ok) {
                    throw new Error(data.detail || 'Something went wrong');
                }

                jobId = data.job_id;
                statusMsg.textContent = 'Downloading audio...';

                // Poll for job completion
                while (isProcessing) {
                    await new Promise(r => setTimeout(r, 5000));
                    if (!isProcessing) break;

                    const pollRes = await fetch(`/api/status/${jobId}`, {
                        signal: abortController.signal,
                    });
                    const pollData = await pollRes.json();

                    if (pollData.status === 'complete') {
                        finishProgress();
                        statusMsg.textContent = 'Done!';
                        audio.src = pollData.audio_url;
                        downloadLink.href = pollData.audio_url;
                        player.classList.add('visible');
                        actions.classList.add('visible');
                        break;
                    } else if (pollData.status === 'error') {
                        throw new Error(pollData.error || 'Processing failed');
                    } else {
                        // Update status message based on step
                        const step = pollData.step || '';
                        if (step === 'downloading') {
                            statusMsg.textContent = 'Downloading audio...';
                        } else if (step === 'separating') {
                            statusMsg.textContent = 'Removing vocals (this takes a few minutes)...';
                        } else if (step === 'queued') {
                            statusMsg.textContent = 'Queued, waiting for processing slot...';
                        }
                    }
                }

            } catch (err) {
                stopProgress();
                if (err.name === 'AbortError') return;
                statusMsg.className = 'message error';
                statusMsg.textContent = err.message;
                goBtn.disabled = false;
                urlInput.disabled = false;
            } finally {
                isProcessing = false;
                abortController = null;
            }
        }
    </script>
</body>
</html>
